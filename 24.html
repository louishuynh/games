    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #10001a;
      --panel:   #1e0033;
      --yellow:  #ffe600;
      --cyan:    #00e5ff;
      --magenta: #ff00aa;
      --white:   #f0f0f0;
      /* Oxanium is embedded via @font-face above; monospace is the fallback. */
      --font: 'Oxanium', ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    }

    body {
      font-family: var(--font);
      font-weight: 700;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--white);
      padding: 2rem;
      /* scanlines overlay */
      position: relative;
    }

    /* CRT scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0, 0, 0, 0.18) 3px,
        rgba(0, 0, 0, 0.18) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .back {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 101;
      color: var(--cyan);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      border: 2px solid var(--cyan);
      padding: 0.4rem 0.7rem;
      background: var(--panel);
      box-shadow: 3px 3px 0 var(--cyan);
      transition: transform 0.08s, box-shadow 0.08s;
    }
    .back:hover {
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0 var(--cyan);
    }

    h1 {
      font-size: 3.5rem;
      color: var(--yellow);
      letter-spacing: 0.08em;
      text-shadow: 4px 4px 0 var(--magenta);
      margin-bottom: 1rem;
    }

    .subtitle {
      color: var(--cyan);
      font-size: 0.85rem;
      margin-bottom: 3rem;
      text-align: center;
      line-height: 2;
      letter-spacing: 0.05em;
    }

    .cards {
      display: flex;
      gap: 1.2rem;
      margin-bottom: 3rem;
    }

    .card {
      background: var(--panel);
      border: 3px solid var(--yellow);
      border-radius: 0;
      width: 120px;
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5.5rem;
      color: var(--yellow);
      box-shadow: 6px 6px 0 var(--magenta);
      transition: transform 0.08s, box-shadow 0.08s;
      user-select: none;
      image-rendering: pixelated;
    }

    .card.pop {
      transform: translate(-3px, -3px);
      box-shadow: 9px 9px 0 var(--magenta);
    }

    .buttons {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      font-family: var(--font);
      font-weight: 700;
      font-size: 0.9rem;
      padding: 0.9rem 1.6rem;
      border-radius: 0;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: transform 0.08s, box-shadow 0.08s;
    }

    button:hover {
      transform: translate(-2px, -2px);
    }

    button:active {
      transform: translate(3px, 3px);
      box-shadow: none !important;
    }

    #btn-refresh {
      background: var(--yellow);
      color: #10001a;
      border: 3px solid var(--yellow);
      box-shadow: 4px 4px 0 #fff;
    }

    #btn-refresh:hover {
      box-shadow: 6px 6px 0 #fff;
    }

    #btn-reveal {
      background: transparent;
      color: var(--cyan);
      border: 3px solid var(--cyan);
      box-shadow: 4px 4px 0 var(--cyan);
    }

    #btn-reveal:hover {
      background: var(--cyan);
      color: #10001a;
      box-shadow: 6px 6px 0 var(--cyan);
    }

    .solution-box {
      margin-top: 2.5rem;
      min-height: 2.5rem;
      font-size: 1rem;
      color: var(--cyan);
      text-align: center;
      letter-spacing: 0.05em;
      line-height: 2;
    }

    .solution-box.none {
      color: var(--magenta);
      font-size: 0.85rem;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .blink { animation: blink 1.1s step-start infinite; }

    @media (max-width: 560px) {
      h1 { font-size: 2rem; }
      .card { width: 72px; height: 90px; font-size: 3.5rem; box-shadow: 4px 4px 0 var(--magenta); }
      .cards { gap: 0.7rem; }
      .subtitle { font-size: 0.42rem; }
    }
  </style>
</head>
<body>

  <a class="back" href="index.html">&larr; GAMES</a>

  <h1>MAKE&nbsp;24</h1>
  <p class="subtitle">USE  +  &minus;  &times;  &divide;  ^  AND BRACKETS<br>TO REACH <span class="blink">24</span></p>

  <div class="cards">
    <div class="card" id="c0"></div>
    <div class="card" id="c1"></div>
    <div class="card" id="c2"></div>
    <div class="card" id="c3"></div>
  </div>

  <div class="buttons">
    <button id="btn-refresh" onclick="newGame()">NEW GAME</button>
    <button id="btn-reveal" onclick="reveal()">REVEAL</button>
  </div>

  <div class="solution-box" id="solution"></div>

  <script>
    // ─── Core solver ─────────────────────────────────────────────────────────────
    // Each token: { v: number, e: string }
    function solve(tokens) {
      if (tokens.length === 1) {
        return Math.abs(tokens[0].v - 24) < 1e-9 ? tokens[0].e : null;
      }
      for (let i = 0; i < tokens.length; i++) {
        for (let j = 0; j < tokens.length; j++) {
          if (i === j) continue;
          const rest = tokens.filter((_, k) => k !== i && k !== j);
          const a = tokens[i], b = tokens[j];
          const candidates = [
            { v: a.v + b.v, e: `(${a.e} + ${b.e})` },
            { v: a.v - b.v, e: `(${a.e} − ${b.e})` },
            { v: a.v * b.v, e: `(${a.e} × ${b.e})` },
          ];
          if (Math.abs(b.v) > 1e-9) {
            candidates.push({ v: a.v / b.v, e: `(${a.e} ÷ ${b.e})` });
          }
          // Power: a^b — guard against huge or non-finite results
          const pw = Math.pow(a.v, b.v);
          if (Number.isFinite(pw) && Math.abs(pw) < 1e6) {
            candidates.push({ v: pw, e: `(${a.e} ^ ${b.e})` });
          }
          for (const c of candidates) {
            const r = solve([...rest, c]);
            if (r !== null) return r;
          }
        }
      }
      return null;
    }

    function findSolution(nums) {
      const tokens = nums.map(n => ({ v: n, e: String(n) }));
      const result = solve(tokens);
      return result !== null ? stripOuter(result) : null;
    }

    function stripOuter(expr) {
      while (expr.startsWith('(') && expr.endsWith(')')) {
        let depth = 0;
        let isOuter = true;
        for (let i = 0; i < expr.length - 1; i++) {
          if (expr[i] === '(') depth++;
          else if (expr[i] === ')') depth--;
          if (depth === 0) { isOuter = false; break; }
        }
        if (isOuter) expr = expr.slice(1, -1);
        else break;
      }
      return expr;
    }

    // ─── Game logic ──────────────────────────────────────────────────────────────
    let currentSolution = null;

    function newGame() {
      document.getElementById('solution').textContent = '';
      document.getElementById('solution').className = 'solution-box';

      let nums, sol;
      let tries = 0;
      do {
        nums = Array.from({ length: 4 }, () => Math.floor(Math.random() * 9) + 1);
        sol = findSolution(nums);
        tries++;
      } while (!sol && tries < 200);

      currentSolution = sol;

      nums.forEach((n, i) => {
        const el = document.getElementById(`c${i}`);
        el.textContent = n;
        el.classList.remove('pop');
        // Trigger reflow for animation replay
        void el.offsetWidth;
        el.classList.add('pop');
        setTimeout(() => el.classList.remove('pop'), 300);
      });
    }

    function reveal() {
      const el = document.getElementById('solution');
      if (currentSolution) {
        el.className = 'solution-box';
        el.textContent = currentSolution + ' = 24';
      } else {
        el.className = 'solution-box none';
        el.textContent = 'No solution found for this combination.';
      }
    }

    newGame();
  </script>
</body>
